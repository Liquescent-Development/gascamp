name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  gc-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: read pinned gascity ref
        id: gc-ref
        run: echo "ref=$(cat ci/gc-compat/GASCITY_REF)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: gastownhall/gascity
          ref: ${{ steps.gc-ref.outputs.ref }}
          path: gascity-src
      - uses: actions/setup-go@v5
        with:
          go-version-file: gascity-src/go.mod
          cache-dependency-path: gascity-src/go.sum
      - name: build shim inside the gascity checkout
        run: |
          mkdir -p gascity-src/cmd/camp-corpus-validate
          cp ci/gc-compat/camp_corpus_validate.go gascity-src/cmd/camp-corpus-validate/main.go
          cd gascity-src
          go build -o "$RUNNER_TEMP/camp-corpus-validate" ./cmd/camp-corpus-validate
      - name: validate corpus against the real gc compiler
        run: |
          "$RUNNER_TEMP/camp-corpus-validate" crates/camp-core/tests/fixtures/formulas/valid
      - name: shim self-test — a broken formula must exit 1
        run: |
          mkdir -p "$RUNNER_TEMP/selftest"
          cp ci/gc-compat/selftest-invalid.toml "$RUNNER_TEMP/selftest/"
          set +e
          "$RUNNER_TEMP/camp-corpus-validate" "$RUNNER_TEMP/selftest"
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "self-test: expected exit 1 on a broken formula, got $rc — the shim cannot be trusted" >&2
            exit 1
          fi
      - name: vocabulary cross-check
        run: ci/gc-compat/check_vocab.sh gascity-src "$GITHUB_WORKSPACE"

  gcpacks-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: read pinned gascity-packs ref
        id: gcpacks-ref
        run: echo "ref=$(cat ci/gc-compat/GCPACKS_REF)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: gastownhall/gascity-packs
          ref: ${{ steps.gcpacks-ref.outputs.ref }}
          path: gcpacks-src
      # The gate now drives camp's OWN loader over the corpus, not just its
      # shape — so it needs the binary.
      - name: build camp
        run: cargo build --bin camp
      - name: phase-1 corpus-load gate (pack/agent/transitive + camp loader)
        run: python3 ci/gc-compat/load_corpus_packs.py gcpacks-src target/debug/camp
      - name: the arbiter (independent of camp; predicts the rung ladder)
        run: python3 ci/gc-compat/rungs.py gcpacks-src
      - name: phase-2 formula gate (the rungs, the ceiling, RUNNABLE)
        run: python3 ci/gc-compat/formula_gate.py gcpacks-src target/debug/camp
      - name: "phase-2 END-TO-END gate — an imported corpus formula COOKS AND RUNS (BD8)"
        run: python3 ci/gc-compat/e2e_corpus.py gcpacks-src target/debug/camp
      - name: "phase-3 WORKER CONTRACT gate — the real gc-role-worker fragment closes a gc bead (§14)"
        run: python3 ci/gc-compat/worker_contract.py gcpacks-src target/debug/camp
      - name: compat-4 mail/prime corpus guard (v1 sends stay send-human; prime stays prose-only)
        run: python3 ci/gc-compat/mail_prime_corpus.py gcpacks-src
      - name: read pinned gascity ref
        id: gc-ref
        run: echo "ref=$(cat ci/gc-compat/GASCITY_REF)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: gastownhall/gascity
          ref: ${{ steps.gc-ref.outputs.ref }}
          path: gascity-src
      - uses: actions/setup-go@v5
        with:
          go-version-file: gascity-src/go.mod
      - name: build the gc oracle (factshim — gc's REAL compiler)
        run: |
          mkdir -p gascity-src/cmd/factshim
          cp ci/gc-compat/factshim.go gascity-src/cmd/factshim/main.go
          cd gascity-src
          go build -o "$RUNNER_TEMP/factshim" ./cmd/factshim
      - name: phase-2 DIFFERENTIAL gate (camp's compiler diffed against gc's real one)
        run: python3 ci/gc-compat/differential.py gcpacks-src target/debug/camp "$RUNNER_TEMP/factshim"
